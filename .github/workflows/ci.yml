# CI Workflow — Agent Valley (Bun + TypeScript monorepo)
#
# Jobs: validate → lint → typecheck → test (parallel after validate)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Harness validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # validate.sh Check 5/5 runs `bun run test:coverage`, so Bun + deps must
      # be installed here even though lint/typecheck/test jobs do it too.
      - run: bun install --frozen-lockfile
      - name: Run validate.sh
        env:
          WORKSPACE_ROOT: ${{ runner.temp }}/workspaces
        run: |
          mkdir -p "$WORKSPACE_ROOT"
          chmod +x ./scripts/harness/validate.sh
          ./scripts/harness/validate.sh
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/index.html
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit -p packages/core/tsconfig.json
      - run: bunx tsc --noEmit -p apps/cli/tsconfig.json

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: mkdir -p "$WORKSPACE_ROOT" && bun run test
        env:
          WORKSPACE_ROOT: ${{ runner.temp }}/workspaces
