      #   # See docs/architecture/enforcement/typescript.md

      # Python ──────────────────────────────────────────────────────────────
      # - name: Setup Python
      #   if: matrix.stack == 'python'
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      #     cache: 'pip'
