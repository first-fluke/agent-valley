      #   if: matrix.stack == 'go'
      #   uses: golangci/golangci-lint-action@v6
      #   with:
      #     version: latest
      #   # See docs/architecture/enforcement/go.md

      # ── Harness validation (all stacks) ──────────────────────────────────
      # Checks forbidden patterns, secret leaks, and architecture violations.
      # Defined in: scripts/harness/validate.sh
      # Referenced by: docs/harness/ENTROPY.md section 2, docs/architecture/CONSTRAINTS.md
      - name: Harness validate
        run: |
          chmod +x ./scripts/harness/validate.sh
          ./scripts/harness/validate.sh

  # ── Test ─────────────────────────────────────────────────────────────────
  # Runs after validate succeeds.
  # Add per-stack test runners inside the matrix blocks below.
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Stack-specific test ───────────────────────────────────────────────

