      #   if: matrix.stack == 'python'
      #   run: ruff check .
      #
      # - name: Architecture check (import-linter)
      #   if: matrix.stack == 'python'
      #   run: lint-imports
      #   # See docs/architecture/enforcement/python.md

      # Go ──────────────────────────────────────────────────────────────────
      # - name: Setup Go
      #   if: matrix.stack == 'go'
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.22'
      #     cache: true
