# CI Workflow — Symphony Dev Template
#
# Triggers on push/PR to main.
# Jobs: validate (lint + architecture check) → test.
#
# Stack setup:
#   This template scaffolds a multi-stack matrix. When a stack is chosen,
#   uncomment the relevant section and delete the others.
#   Supported stacks: TypeScript, Python, Go.
#
# Secrets required:
#   LINEAR_API_KEY — set in repository Settings → Secrets → Actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Passed to harness/validate.sh and scripts that need workspace context.
  # In CI we use the runner's temp dir as the workspace root.
  WORKSPACE_ROOT: ${{ runner.temp }}/workspaces

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  # Runs architecture checks and lint before tests.
  # Add per-stack lint steps inside the matrix as your codebase grows.
  validate:
    name: Validate (lint + arch check)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        # When a stack is chosen, keep only the matching entry and configure
        # the install / lint steps below under "Stack-specific lint".
        stack: [scaffold]
        # stack: [typescript]
        # stack: [python]
        # stack: [go]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Stack-specific setup ─────────────────────────────────────────────
      # Uncomment the block that matches your chosen stack.

